<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK777712 Portfolio</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            --card-bg: rgba(255, 255, 255, 0.1);
            --card-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --accent-color: #ffd700;
        }

        [data-theme="light"] {
            --bg-gradient: linear-gradient(-45deg, #fbc2eb, #a6c1ee, #f1f2b5, #135058);
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(255, 255, 255, 0.5);
            --text-color: #333333;
            --accent-color: #007bff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            transition: all 0.5s ease;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 90%;
            max-width: 500px;
            padding: 40px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            text-align: center;
            position: relative;
        }

        .theme-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            font-size: 1.2rem;
            opacity: 0.8;
            transition: transform 0.3s;
        }

        .theme-switch:hover {
            transform: scale(1.1);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 4px solid var(--accent-color);
            object-fit: cover;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        p.bio {
            font-size: 1rem;
            margin-bottom: 25px;
            opacity: 0.9;
            line-height: 1.6;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .skill-badge {
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            border: 1px solid var(--card-border);
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            background: var(--text-color);
            color: #000;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        [data-theme="light"] .link-btn {
            color: #fff;
            background: #333;
        }

        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            filter: brightness(1.1);
        }

        .social-icons {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 1.5rem;
        }

        .social-icons a {
            color: var(--text-color);
            transition: color 0.3s;
        }

        .social-icons a:hover {
            color: var(--accent-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="theme-switch" id="theme-toggle">
            <i class="fas fa-moon"></i>
        </div>

        <img src="https://github.com/HK777712.png" alt="HK777712" class="profile-img">

        <h1>HK777712</h1>
        <p class="bio">Unity (C#), C++, Python を操るエンジニア。ロボコン関連の組み込みから、3Dシミュレーションまで幅広く開発しています。</p>

        <div class="skills">
            <span class="skill-badge">C# / Unity</span>
            <span class="skill-badge">C++ / Embedded</span>
            <span class="skill-badge">Python / YOLO</span>
            <span class="skill-badge">Game Dev</span>
        </div>

        <div class="links">
            <a href="https://github.com/HK777712?tab=repositories" class="link-btn">
                <i class="fab fa-github"></i> View My Repositories
            </a>
            <a href="https://github.com/HK777712/24NB_unity" class="link-btn">
                <i class="fas fa-gamepad"></i> Feature Project: 24NB_unity
            </a>
        </div>

        <div class="social-icons">
            <a href="https://github.com/HK777712"><i class="fab fa-github"></i></a>
            <!-- 他のSNSがあればここに追加 -->
        </div>
    </div>

    <script>
        const toggle = document.getElementById('theme-toggle');
        const body = document.body;
        const icon = toggle.querySelector('i');

        // Check for saved theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            body.setAttribute('data-theme', savedTheme);
            updateIcon(savedTheme);
        }

        toggle.addEventListener('click', () => {
            let theme = body.getAttribute('data-theme');
            if (theme === 'light') {
                body.removeAttribute('data-theme');
                localStorage.setItem('theme', 'dark');
                updateIcon('dark');
            } else {
                body.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
                updateIcon('light');
            }
        });

        function updateIcon(theme) {
            if (theme === 'light') {
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        }
    </script>
</body>
</html>
