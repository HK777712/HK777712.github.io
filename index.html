<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK777712 Portfolio</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            --card-bg: rgba(255, 255, 255, 0.1);
            --card-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --accent-color: #ffd700;
        }

        [data-theme="light"] {
            --bg-gradient: linear-gradient(-45deg, #fbc2eb, #a6c1ee, #f1f2b5, #135058);
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(255, 255, 255, 0.5);
            --text-color: #333333;
            --accent-color: #007bff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            transition: all 0.5s ease;
            padding: 40px 0;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 95%;
            max-width: 800px;
            padding: 40px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            text-align: center;
            position: relative;
        }

        .theme-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            font-size: 1.2rem;
            opacity: 0.8;
            transition: transform 0.3s;
        }

        .theme-switch:hover {
            transform: scale(1.1);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 4px solid var(--accent-color);
            object-fit: cover;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        p.bio {
            font-size: 1rem;
            margin-bottom: 25px;
            opacity: 0.9;
            line-height: 1.6;
        }

        .section-title {
            margin: 40px 0 20px;
            font-size: 1.5rem;
            border-bottom: 2px solid var(--accent-color);
            display: inline-block;
            padding-bottom: 5px;
        }

        .repo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .repo-card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 15px;
            text-align: left;
            transition: transform 0.3s ease;
            text-decoration: none;
            color: inherit;
        }

        .repo-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
        }

        .repo-name {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: var(--accent-color);
            word-break: break-all;
        }

        .repo-desc {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-bottom: 15px;
            height: 3em;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .repo-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .loader {
            font-style: italic;
            opacity: 0.7;
        }

        .social-icons {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 1.5rem;
        }

        .social-icons a {
            color: var(--text-color);
            transition: color 0.3s;
        }

        .social-icons a:hover {
            color: var(--accent-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="theme-switch" id="theme-toggle">
            <i class="fas fa-moon"></i>
        </div>

        <img src="https://github.com/HK777712.png" alt="HK777712" class="profile-img">

        <h1>HK777712</h1>
        <p class="bio">Unity (C#), C++, Python を操るエンジニア。ロボコン関連の組み込みから、3Dシミュレーションまで幅広く開発しています。</p>

        <h2 class="section-title">Projects</h2>
        <div class="repo-grid" id="repo-container">
            <p class="loader">Loading latest projects...</p>
        </div>

        <div class="social-icons">
            <a href="https://github.com/HK777712"><i class="fab fa-github"></i> GitHub</a>
        </div>
    </div>

    <script>
        // Theme Toggle
        const toggle = document.getElementById('theme-toggle');
        const body = document.body;
        const icon = toggle.querySelector('i');

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            body.setAttribute('data-theme', savedTheme);
            updateIcon(savedTheme);
        }

        toggle.addEventListener('click', () => {
            let theme = body.getAttribute('data-theme');
            if (theme === 'light') {
                body.removeAttribute('data-theme');
                localStorage.setItem('theme', 'dark');
                updateIcon('dark');
            } else {
                body.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
                updateIcon('light');
            }
        });

        function updateIcon(theme) {
            if (theme === 'light') {
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        }

        // GitHub API Integration
        async function fetchRepos() {
            const container = document.getElementById('repo-container');
            try {
                const response = await fetch('https://api.github.com/users/HK777712/repos?sort=updated&per_page=6');
                const repos = await response.json();
                
                container.innerHTML = '';
                
                repos.forEach(repo => {
                    if (repo.name === 'HK777712.github.io') return; // Skip this portfolio repo itself

                    const card = document.createElement('a');
                    card.className = 'repo-card';
                    card.href = repo.html_url;
                    card.target = '_blank';
                    
                    card.innerHTML = `
                        <div class="repo-name">${repo.name}</div>
                        <div class="repo-desc">${repo.description || 'No description available.'}</div>
                        <div class="repo-meta">
                            <span><i class="fas fa-circle" style="color: ${getLangColor(repo.language)}"></i> ${repo.language || 'Plain'}</span>
                            <span><i class="far fa-star"></i> ${repo.stargazers_count}</span>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('Error fetching repos:', error);
                container.innerHTML = '<p>Failed to load projects. Check console for details.</p>';
            }
        }

        function getLangColor(lang) {
            const colors = {
                'C#': '#178600',
                'C++': '#f34b7d',
                'Python': '#3572A5',
                'ShaderLab': '#222c37',
                'HTML': '#e34c26',
                'JavaScript': '#f1e05a'
            };
            return colors[lang] || '#888';
        }

        fetchRepos();
    </script>
</body>
</html>
